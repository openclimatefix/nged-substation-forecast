repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files

  - repo: local
    hooks:
      - id: ruff-check
        name: ruff check
        entry: uv run ruff check --fix --force-exclude
        language: system
        types: [python]
      - id: ruff-format
        name: ruff format
        entry: uv run ruff format --force-exclude
        language: system
        types: [python]
      - id: ty
        name: ty
        entry: uv run --all-packages ty check --project .
        language: system
        pass_filenames: false
        always_run: true
      - id: pymarkdown
        name: pymarkdown (markdown files)
        entry: uv run pymarkdown scan
        language: system
        types: [markdown]
        exclude: ^plans/
      - id: lint-docstring-markdown
        name: pymarkdown (Python docstrings)
        entry: uv run python scripts/lint_docstring_markdown.py
        language: system
        types: [python]
