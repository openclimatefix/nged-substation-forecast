[project]
name = "nged_data"
version = "0.0.1"
description = "Package for handling NGED JSON data"
requires-python = ">=3.14"
dependencies = [
    "polars>=1.0.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/nged_data"]
