[project]
name = "dashboard"
version = "0.1.0"
description = "Interactive dashboard web apps for visualising NGED data and forecasts"
readme = "README.md"
requires-python = ">=3.14"
dependencies = [
    "altair>=6.0.0",
    "contracts",
    "deltalake",
    "lonboard>=0.13.0",
    "marimo>=0.19.7",
    "plotting",
    "polars>=1.37.1",
    "pyarrow>=23.0.0",
    "geoarrow-pyarrow>=0.2.0",
    "patito>=0.8.5",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[dependency-groups]
dev = [
    "pre-commit>=4.5.1",
    "ruff>=0.15.0",
    "ty>=0.0.15",
]
