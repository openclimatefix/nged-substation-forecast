[project]
name = "dynamical-data"
version = "0.1.0"
description = "Download & process NWPs from Dynamical.org"
readme = "README.md"
authors = [
    { name = "Jack Kelly", email = "jack@openclimatefix.org" }
]
requires-python = ">=3.14"
dependencies = [
    "contracts",
    "dynamical-catalog>=0.5.0",
    "numpy>=1.24",
    "patito",
    "polars>=1.38.1",
    "xarray>=2026.1.0",
]

[build-system]
requires = ["uv_build>=0.9.28,<0.10.0"]
build-backend = "uv_build"

[dependency-groups]
dev = [
    "pre-commit>=4.5.1",
]
