[project]
name = "contracts"
version = "0.0.1"
description = "Data contracts for the NGED substation forecast project"
requires-python = ">=3.14"
dependencies = [
    "patito>=0.8.0",
    "polars>=1.0.0",
    "pydantic-settings>=2.4.0",
    "omegaconf>=2.3.0",
    "deltalake>=1.6.0",
    "obstore>=0.11.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.pytest.ini_options]
