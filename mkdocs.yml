site_name: NGED Substation Forecast
theme:
  name: material
  features:
    - navigation.sections
    - navigation.expand
    - content.code.copy

markdown_extensions:
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.highlight
  - pymdownx.superfences

extra_javascript:
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js

plugins:
  - search
  - mkdocstrings:
      default_handler: python
      handlers:
        python:
          paths: [.]
          options:
            show_source: true
            show_root_heading: true
            show_category_heading: true
            show_if_no_docstring: true
            inherited_members: true
            members_order: source
  - include-markdown

nav:
  - Home: index.md
  - Documentation Guide: documentation-guide.md
  - Background & Challenges:
      - NGED Network: background/network.md
      - Requirements: background/requirements.md
      - NGED's Incumbent Forecast: background/nged-incumbent-forecast.md
      - Data Quality: background/data-quality.md
      - Switching Events: background/switching-events.md
  - Techniques:
      - Overview: techniques/index.md
      - Convex Optimisation: techniques/convex-optimisation.md
      - Probabilistic Forecasting: techniques/probabilistic-forecasting.md
      - Differentiable Physics: techniques/differentiable-physics.md
      - Encoders: techniques/encoders.md
      - Disaggregation Evaluation: techniques/disaggregation-evaluation.md
  - Architecture:
      - Overview: architecture/overview.md
      - Forecast Delivery: architecture/forecast-delivery.md
      - ML Orchestration Design: architecture/ml-orchestration.md
      - Production Deployment Design: architecture/production-deployment.md
      - Code Style: architecture/code-style.md
  - ML Experimentation:
      - Overview: ml_experimentation/index.md
      - Model configuration: ml_experimentation/model-configuration.md
      - Running an experiment end-to-end: ml_experimentation/dagster-workflow.md
      - Cross-validation folds: ml_experimentation/cross-validation-folds.md
      - Evaluating new data sources: ml_experimentation/evaluating-new-data-sources.md
  - Live Service:
      - Overview: live_service/index.md
      - Environment & storage setup: live_service/setup.md
      - Deploying a new production image: live_service/deployment.md
      - Running live forecasts end-to-end: live_service/dagster-workflow.md
  - Roadmap:
      - Overview: roadmap/index.md
      - Live Service: roadmap/live-service.md
      - Handover to NGED: roadmap/handover.md
      - Delivery Tables: roadmap/delivery-tables.md
      - Forecast Building Blocks: roadmap/forecast-building-blocks.md
      - Metrics & Leaderboard: roadmap/metrics-and-leaderboard.md
      - Data Sources: roadmap/data-sources.md
      - Capacity Estimation: roadmap/capacity-estimation.md
      - Net-Demand Disaggregation: roadmap/disaggregation.md
      - Switching Events: roadmap/switching-events.md
      - XGBoost Improvements: roadmap/xgboost-improvements.md
      - Engineering Health: roadmap/engineering-health.md
  - API Reference:
      - Overview: api/index.md
      - Contracts: api/contracts/index.md
      - Delta Store: api/delta_store/index.md
      - Dynamical Data: api/dynamical_data/index.md
      - Geo: api/geo/index.md
      - ML Core: api/ml_core/index.md
      - NGED Data: api/nged_data/index.md
      - XGBoost Forecaster: api/xgboost_forecaster/index.md
